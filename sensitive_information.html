<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TMF Bridge 方法探测</title>
<style>
body { background: #0d1117; color: #c9d1d9; font-family: monospace; font-size: 12px; padding: 12px; }
h2 { color: #ff6b6b; margin-bottom: 8px; }
pre { background: #161b22; padding: 10px; border-radius: 6px; overflow: auto; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
.ok { color: #3fb950; }
.warn { color: #e3b341; }
.err { color: #f85149; }
button { background: #238636; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; margin: 4px 2px; font-size: 11px; }
button:hover { background: #2ea043; }
input { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; padding: 4px 8px; border-radius: 4px; width: 100%; margin-bottom: 4px; font-size: 11px; }
.section { margin-bottom: 16px; }
</style>
</head>
<body>

<h2>🔬 TMF Bridge 方法探测工具</h2>

<div class="section">
<h3 class="warn">Step 1: Bridge 对象属性枚举</h3>
<button onclick="inspectBridge()">枚举所有方法和属性</button>
<pre id="inspect-out">点击上方按钮开始...</pre>
</div>

<div class="section">
<h3 class="warn">Step 2: 常用调用方式测试</h3>
<button onclick="testCallMethods()">自动测试所有可能的调用方式</button>
<pre id="call-out">等待...</pre>
</div>

<div class="section">
<h3 class="warn">Step 3: 手动调用（找到正确方式后）</h3>
<input id="api-name" value="thirdGetIsLogin" placeholder="API名称">
<input id="api-params" value="{}" placeholder="参数 JSON">
<button onclick="manualCall()">调用</button>
<pre id="manual-out">等待...</pre>
</div>

<div class="section">
<h3 class="warn">Step 4: 全局对象枚举（找所有 Bridge 相关对象）</h3>
<button onclick="enumGlobal()">枚举 window 上的 Bridge 对象</button>
<pre id="global-out">等待...</pre>
</div>

<script>
function log(id, text, cls) {
  var el = document.getElementById(id);
  el.innerHTML += '<span class="' + (cls||'') + '">' + escHtml(text) + '\n</span>';
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Step 1: 枚举 TMFJSBridge 的所有属性和方法
function inspectBridge() {
  var el = document.getElementById('inspect-out');
  el.innerHTML = '';
  
  if (!window.TMFJSBridge) {
    log('inspect-out', '❌ window.TMFJSBridge 不存在！', 'err');
    return;
  }
  
  log('inspect-out', '✅ window.TMFJSBridge 存在', 'ok');
  log('inspect-out', 'typeof: ' + typeof window.TMFJSBridge, 'ok');
  log('inspect-out', '\n--- 所有属性 ---', 'warn');
  
  // 枚举所有属性（包括原型链）
  var props = [];
  for (var key in window.TMFJSBridge) {
    props.push(key + ' [' + typeof window.TMFJSBridge[key] + ']');
  }
  
  // 也尝试 Object.getOwnPropertyNames
  try {
    var ownProps = Object.getOwnPropertyNames(window.TMFJSBridge);
    ownProps.forEach(function(k) {
      var type = typeof window.TMFJSBridge[k];
      if (props.indexOf(k + ' [' + type + ']') === -1) {
        props.push(k + ' [' + type + '] (own)');
      }
    });
  } catch(e) {}
  
  if (props.length === 0) {
    log('inspect-out', '(无可枚举属性，尝试原型链...)', 'warn');
    // 尝试常见方法名
    var tryMethods = ['call', 'callHandler', 'invoke', 'send', 'postMessage', 
                      'nativeCall', 'callNative', 'dispatch', 'trigger',
                      'register', 'registerHandler', 'on', 'emit',
                      'handleMessageFromNative', '_handleMessageFromNative'];
    tryMethods.forEach(function(m) {
      var type = typeof window.TMFJSBridge[m];
      if (type !== 'undefined') {
        log('inspect-out', '  ' + m + ': ' + type, 'ok');
      }
    });
  } else {
    props.forEach(function(p) { log('inspect-out', '  ' + p, 'ok'); });
  }
  
  // 打印 JSON 序列化结果（看看有没有隐藏属性）
  log('inspect-out', '\n--- JSON.stringify ---', 'warn');
  try {
    log('inspect-out', JSON.stringify(window.TMFJSBridge), 'ok');
  } catch(e) {
    log('inspect-out', '无法序列化: ' + e.message, 'err');
  }
  
  // 打印 toString
  log('inspect-out', '\n--- toString ---', 'warn');
  try {
    log('inspect-out', String(window.TMFJSBridge), 'ok');
  } catch(e) {
    log('inspect-out', e.message, 'err');
  }
  
  // 看 constructor
  log('inspect-out', '\n--- constructor ---', 'warn');
  try {
    log('inspect-out', String(window.TMFJSBridge.constructor), 'ok');
  } catch(e) {}
}

// Step 2: 自动测试所有可能的调用方式
function testCallMethods() {
  var el = document.getElementById('call-out');
  el.innerHTML = '';
  
  if (!window.TMFJSBridge) {
    log('call-out', '❌ Bridge 不存在', 'err');
    return;
  }
  
  var testCb = function(result) {
    log('call-out', '  [回调收到]: ' + JSON.stringify(result), 'ok');
  };
  
  var methods = [
    // TMF 官方文档可能的格式
    function() { window.TMFJSBridge.callHandler('thirdGetIsLogin', {}, testCb); return 'callHandler(name, data, cb)'; },
    function() { window.TMFJSBridge.call('thirdGetIsLogin', '{}', '_cb'); return 'call(name, str, cbName)'; },
    function() { window.TMFJSBridge.invoke('thirdGetIsLogin', {}, testCb); return 'invoke(name, data, cb)'; },
    function() { window.TMFJSBridge.send('thirdGetIsLogin', {}, testCb); return 'send(name, data, cb)'; },
    function() { window.TMFJSBridge.nativeCall('thirdGetIsLogin', '{}', '_cb'); return 'nativeCall(name, str, cbName)'; },
    // WebViewJavascriptBridge 风格
    function() { window.TMFJSBridge.handleMessageFromNative(JSON.stringify({handlerName:'thirdGetIsLogin',data:{}})); return 'handleMessageFromNative(json)'; },
    // 直接调用
    function() { window.TMFJSBridge('thirdGetIsLogin', {}, testCb); return 'TMFJSBridge(name, data, cb)'; },
  ];
  
  window._cb = testCb; // 全局回调备用
  
  methods.forEach(function(fn, i) {
    var desc = '';
    try {
      desc = fn();
      log('call-out', '[' + i + '] ' + desc + ' → ✅ 无异常', 'ok');
    } catch(e) {
      log('call-out', '[' + i + '] ' + (desc||'?') + ' → ❌ ' + e.message, 'err');
    }
  });
  
  log('call-out', '\n等待 3 秒看是否有回调...', 'warn');
  setTimeout(function() {
    log('call-out', '\n3秒后未收到额外回调（如有请看上方）', 'warn');
  }, 3000);
}

// Step 3: 手动调用
function manualCall() {
  var el = document.getElementById('manual-out');
  el.innerHTML = '';
  var apiName = document.getElementById('api-name').value.trim();
  var paramsStr = document.getElementById('api-params').value.trim();
  var params = {};
  try { params = JSON.parse(paramsStr); } catch(e) {}
  
  log('manual-out', '调用: ' + apiName + ' params: ' + paramsStr, 'warn');
  
  var cbName = '__manualCb_' + Date.now();
  window[cbName] = function(result) {
    log('manual-out', '✅ 回调: ' + JSON.stringify(result), 'ok');
    delete window[cbName];
  };
  
  // 尝试 callHandler 方式
  try {
    window.TMFJSBridge.callHandler(apiName, params, window[cbName]);
    log('manual-out', '  → callHandler 已发出', 'ok');
  } catch(e) {
    log('manual-out', '  → callHandler 失败: ' + e.message, 'err');
  }
  
  setTimeout(function(){
    if(window[cbName]) {
      log('manual-out', '  → 6s 超时，无响应', 'err');
      delete window[cbName];
    }
  }, 6000);
}

// Step 4: 枚举全局 window 上的 Bridge 相关对象
function enumGlobal() {
  var el = document.getElementById('global-out');
  el.innerHTML = '';
  
  var keywords = ['bridge', 'Bridge', 'tmf', 'TMF', 'jsapi', 'JSAPI', 'native', 'Native', 
                   'webkit', 'android', 'csii', 'bjbank'];
  var found = [];
  
  try {
    Object.keys(window).forEach(function(key) {
      if (keywords.some(function(k){ return key.indexOf(k) >= 0; })) {
        found.push(key + ' [' + typeof window[key] + ']');
      }
    });
  } catch(e) {
    // Chrome 限制，用 for...in
    for (var k in window) {
      if (keywords.some(function(kw){ return k.indexOf(kw) >= 0; })) {
        found.push(k + ' [' + typeof window[k] + ']');
      }
    }
  }
  
  if (found.length > 0) {
    log('global-out', '发现以下相关全局对象:', 'ok');
    found.forEach(function(f) { log('global-out', '  ' + f, 'ok'); });
  } else {
    log('global-out', '未发现 Bridge 相关全局对象', 'err');
  }
  
  // 额外检查 webkit messageHandlers
  log('global-out', '\n--- webkit.messageHandlers ---', 'warn');
  if (window.webkit && window.webkit.messageHandlers) {
    log('global-out', '存在 webkit.messageHandlers', 'ok');
  } else {
    log('global-out', '不存在（Android 预期）', 'warn');
  }
  
  // 检查 Android 注入的 Java 对象
  log('global-out', '\n--- Android JavascriptInterface ---', 'warn');
  ['Android', 'android', 'TMF', 'JsBridge', 'CsiiAndroid'].forEach(function(name) {
    if (window[name]) {
      log('global-out', '✅ window.' + name + ' 存在! typeof=' + typeof window[name], 'ok');
    }
  });
}

// 页面加载后自动执行环境检测
window.addEventListener('load', function() {
  if (window.TMFJSBridge) {
    log('inspect-out', '✅ TMFJSBridge 已注入，请点击"枚举所有方法"按钮', 'ok');
    // 自动执行枚举
    setTimeout(inspectBridge, 500);
    setTimeout(testCallMethods, 1000);
    setTimeout(enumGlobal, 1500);
  } else {
    document.addEventListener('TMFJSBridgeReady', function() {
      inspectBridge();
      setTimeout(testCallMethods, 500);
      setTimeout(enumGlobal, 1000);
    }, { once: true });
  }
});
</script>
</body>
</html>
